# ── Application ───────────────────────────────────────────────
spring.application.name=hms-backend

# ── MongoDB ───────────────────────────────────────────────────
spring.data.mongodb.uri=${MONGO_URI}
spring.data.mongodb.database=${MONGO_DB:hospital_db}
spring.data.mongodb.auto-index-creation=true

# ── Server ────────────────────────────────────────────────────
server.port=${PORT:8080}
server.servlet.context-path=/
server.error.include-message=always
server.error.include-stacktrace=on-param

# ── JWT ───────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET}
jwt.expiration.ms=36000000

# ── Logging Configuration ─────────────────────────────────────
logging.level.root=WARN
logging.level.com.hms=INFO
logging.level.org.springframework.web=WARN
logging.level.org.springframework.data.mongodb=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ── Actuator – Health & Metrics ───────────────────────────────
management.endpoints.web.exposure.include=health,metrics,info
management.endpoint.health.show-details=when-authorized
management.health.livenessState.enabled=true
management.health.readinessState.enabled=true
management.endpoint.health.probes.enabled=true
management.endpoints.web.base-path=/actuator

# ── Jackson Configuration ──────────────────────────────────────
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC

# ── Database Connection Pool ──────────────────────────────────
spring.data.mongodb.pool.max-size=10
spring.data.mongodb.pool.min-size=5
